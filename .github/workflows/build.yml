name: Build OmniScribe

# Runs on GitHub's free macOS servers. Produces a ready-to-run OmniScribe.app
# you can download from the run's "Artifacts" section — no local compiling.

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # lets you trigger a build manually from the Actions tab

jobs:
  build:
    runs-on: macos-15   # macOS Sequoia runner — ships modern Xcode 16 toolchains

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        # WhisperKit's recent releases need a modern Swift toolchain; pin the
        # newest stable Xcode on the runner so package resolution doesn't fail.
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build (unsigned, auto-resolves WhisperKit)
        # Uses -scheme (required alongside -derivedDataPath). The shared scheme
        # lives in OmniScribe.xcodeproj/xcshareddata/xcschemes/. xcodebuild
        # resolves Swift packages automatically when building a scheme.
        run: |
          set -o pipefail
          xcodebuild \
            -project OmniScribe.xcodeproj \
            -scheme OmniScribe \
            -configuration Release \
            -derivedDataPath build \
            MACOSX_DEPLOYMENT_TARGET=14.0 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            build

      - name: Ad-hoc sign the app
        # An ad-hoc signature lets the app launch on your Mac. Accessibility
        # permission will need re-granting after each new build (the signature
        # changes every time).
        run: |
          APP="build/Build/Products/Release/OmniScribe.app"
          codesign --force --deep --sign - "$APP"
          codesign --verify --verbose "$APP" || true

      - name: Zip the app
        run: |
          cd build/Build/Products/Release
          ditto -c -k --keepParent OmniScribe.app OmniScribe.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OmniScribe-app
          path: build/Build/Products/Release/OmniScribe.zip
          if-no-files-found: error
